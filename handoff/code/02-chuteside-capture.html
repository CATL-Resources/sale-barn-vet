<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sale Barn Vet — Chuteside capture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#E9E9E4;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  *{box-sizing:border-box;}
  .frame-wrap{display:flex;align-items:flex-start;justify-content:center;padding:32px;}
</style>
</head>
<body>
<!-- Sale Barn Vet · Screen 2 — Chuteside capture (filled-in state). 390x844 mobile frame. -->
<div class="frame-wrap">
<div style="width: 390px; height: 844px; background: rgb(245, 245, 240); border: 1px solid rgb(212, 212, 208); border-radius: 18px; box-shadow: rgba(14, 38, 70, 0.1) 0px 12px 32px; display: flex; flex-direction: column; position: relative; overflow: hidden;">

      <div style="background: rgb(14, 38, 70); min-height: 60px; display: flex; align-items: center; gap: 4px; padding: 6px 12px 6px 4px; flex-shrink: 0; border-radius: 17px 17px 0px 0px;">
        <button aria-label="Back" style="width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: transparent; border: none; cursor: pointer; padding: 0px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
        </button>
        <div style="flex: 1 1 0%; min-width: 0px; display: flex; flex-direction: column; gap: 2px;">
          <div style="font-size: 16px; font-weight: 600; color: rgb(255, 255, 255); letter-spacing: -0.01em;">Capture</div>
          <div style="font-size: 12px; font-weight: 600; color: rgb(85, 186, 170); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Pen 4 · Johnson · Bred cows</div>
        </div>
        <button aria-label="Head count" style="height: 34px; min-width: 44px; display: flex; align-items: center; justify-content: center; background: rgb(243, 209, 42); color: rgb(14, 38, 70); border: none; border-radius: 999px; padding: 0px 16px; font-family: inherit; font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; cursor: pointer; flex-shrink: 0; transition: transform 150ms;">17 of 30</button>
      </div>

      <!-- sticky batch header -->
      <div style="flex-shrink: 0; padding: 12px 12px 0px;">
        <div style="background: linear-gradient(150deg, rgb(29, 74, 124) 0%, rgb(18, 50, 92) 45%, rgb(14, 38, 70) 100%); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: rgba(255, 255, 255, 0.08) 0px 1px 0px inset; border-radius: 12px; padding: 11px 12px 12px;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px;">
            <div style="font-size: 11px; font-weight: 700; letter-spacing: 0.07em; color: rgb(143, 168, 204);">STICKY BATCH</div>
            <button style="height: 28px; display: inline-flex; align-items: center; gap: 5px; padding: 0px 11px; border-radius: 999px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.22); font-family: inherit; font-size: 12px; font-weight: 700; color: rgb(255, 255, 255); cursor: pointer;">Next pen</button>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <div style="background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.14); border-radius: 10px; padding: 7px 12px;">
              <div style="font-size: 11px; font-weight: 600; color: rgb(85, 186, 170);">Pen</div>
              <div style="font-size: 16px; font-weight: 700; color: rgb(255, 255, 255); font-variant-numeric: tabular-nums;">4</div>
            </div>
            <div style="background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.14); border-radius: 10px; padding: 7px 12px;">
              <div style="font-size: 11px; font-weight: 600; color: rgb(85, 186, 170);">Expected</div>
              <div style="font-size: 16px; font-weight: 700; color: rgb(255, 255, 255); font-variant-numeric: tabular-nums;">30</div>
            </div>
            <button style="background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.14); border-radius: 10px; padding: 7px 10px 7px 12px; display: flex; align-items: center; gap: 6px; font-family: inherit; cursor: pointer; text-align: left;">
              <span style="flex: 1 1 0%; min-width: 0px;"><span style="display: block; font-size: 11px; font-weight: 600; color: rgb(85, 186, 170);">Seller</span><span style="display: block; font-size: 15px; font-weight: 700; color: rgb(255, 255, 255); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Johnson</span></span>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8FA8CC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><path d="m6 9 6 6 6-6"></path></svg>
            </button>
            <button style="background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.14); border-radius: 10px; padding: 7px 10px 7px 12px; display: flex; align-items: center; gap: 6px; font-family: inherit; cursor: pointer; text-align: left;">
              <span style="flex: 1 1 0%; min-width: 0px;"><span style="display: block; font-size: 11px; font-weight: 600; color: rgb(85, 186, 170);">Animal type</span><span style="display: block; font-size: 15px; font-weight: 700; color: rgb(255, 255, 255); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Bred cows</span></span>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8FA8CC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><path d="m6 9 6 6 6-6"></path></svg>
            </button>
          </div>
        </div>
      </div>

      <div style="flex: 1 1 0%; min-height: 0px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 12px 12px 0px;">

        <!-- Identity -->
        <div style="background: rgb(255, 255, 255); border: 1px solid rgb(212, 212, 208); border-radius: 12px; overflow: hidden;">
          <div style="background: rgb(238, 241, 246); padding: 7px 12px 8px; border-bottom: 1px solid rgb(222, 227, 236);">
            <div style="font-size: 14px; font-weight: 700; color: rgb(14, 38, 70); letter-spacing: -0.01em;">Identity</div>
            <div style="width: 26px; height: 3px; border-radius: 2px; background: rgb(243, 209, 42); margin-top: 4px;"></div>
          </div>
          <div style="padding: 12px; display: flex; flex-direction: column; gap: 9px;">
              <div style="display: flex; align-items: center; gap: 8px;">
                <div style="width: 85px; flex-shrink: 0; font-size: 14px; font-weight: 600; color: rgb(26, 26, 26);">Official ID</div>
                <button style="flex: 1 1 0%; min-width: 0px; height: 44px; display: flex; align-items: center; gap: 8px; padding: 0px 14px; border-radius: 10px; background: rgb(225, 245, 238); border: 1px solid rgb(85, 186, 170); font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; text-align: left;">
                  <span style="flex: 1 1 0%; min-width: 0px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: rgb(26, 107, 94);">Scan or tap to enter</span>
                    <span style="flex-shrink: 0; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: rgb(46, 148, 134); display: inline-flex; align-items: center; gap: 4px;"><span style="width: 7px; height: 7px; border-radius: 999px; background: rgb(85, 186, 170);"></span>SCANNING</span>
                </button>
              </div>
              <div style="display: flex; align-items: center; gap: 8px;">
                <div style="width: 85px; flex-shrink: 0; font-size: 14px; font-weight: 600; color: rgb(26, 26, 26);">Secondary EID</div>
                <button style="flex: 1 1 0%; min-width: 0px; height: 44px; display: flex; align-items: center; gap: 8px; padding: 0px 14px; border-radius: 10px; background: rgb(255, 255, 255); border: 1px solid rgb(212, 212, 208); font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; text-align: left;">
                  <span style="flex: 1 1 0%; min-width: 0px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: rgb(154, 154, 166);">Optional · 900-series</span>
                </button>
              </div>
              <div style="display: flex; align-items: center; gap: 8px;">
                <div style="width: 85px; flex-shrink: 0; font-size: 14px; font-weight: 600; color: rgb(26, 26, 26);">Back tag</div>
                <button style="flex: 1 1 0%; min-width: 0px; height: 44px; display: flex; align-items: center; gap: 8px; padding: 0px 14px; border-radius: 10px; background: rgb(255, 255, 255); border: 1px solid rgb(212, 212, 208); font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; text-align: left;">
                  <span style="flex: 1 1 0%; min-width: 0px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: rgb(154, 154, 166);">Optional · barcode</span>
                </button>
              </div>
          </div>
        </div>

        <!-- Attributes -->
        <div style="background: rgb(255, 255, 255); border: 1px solid rgb(212, 212, 208); border-radius: 12px; overflow: hidden;">
          <div style="background: rgb(238, 241, 246); padding: 7px 12px 8px; border-bottom: 1px solid rgb(222, 227, 236);">
            <div style="font-size: 14px; font-weight: 700; color: rgb(14, 38, 70); letter-spacing: -0.01em;">Attributes</div>
            <div style="width: 26px; height: 3px; border-radius: 2px; background: rgb(243, 209, 42); margin-top: 4px;"></div>
          </div>
          <div style="padding: 12px; display: flex; flex-direction: column; gap: 14px;">

            <div>
              <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                <div style="font-size: 13px; font-weight: 700; color: rgb(26, 26, 26);">Age — tag color</div>
                <div style="flex: 1 1 0%;"></div>
                <button style="height: 36px; display: inline-flex; align-items: center; gap: 6px; padding: 0px 12px; border-radius: 999px; background: rgb(243, 243, 245); border: 1px solid rgb(212, 212, 208); font-family: inherit; font-size: 13px; font-weight: 600; color: rgb(113, 113, 130); cursor: pointer;">Age <span style="color: rgb(194, 194, 202);">·</span> <span style="color: rgb(154, 154, 166);">—</span></button>
              </div>
              <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                  <button style="height: 38px; padding: 0px 12px; display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208);"><span style="width: 11px; height: 11px; border-radius: 999px; flex-shrink: 0; background: rgb(255, 255, 255); border: 1.5px solid rgb(201, 201, 196);"></span>White</button>
                  <button style="height: 38px; padding: 0px 12px; display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(225, 245, 238); color: rgb(46, 148, 134); border: 1px dashed rgb(85, 186, 170);"><span style="width: 11px; height: 11px; border-radius: 999px; flex-shrink: 0; background: rgb(243, 209, 42); border: 1px solid rgba(0, 0, 0, 0.12);"></span>Yellow</button>
                  <button style="height: 38px; padding: 0px 12px; display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208);"><span style="width: 11px; height: 11px; border-radius: 999px; flex-shrink: 0; background: rgb(63, 166, 106); border: 1px solid rgba(0, 0, 0, 0.12);"></span>Green</button>
                  <button style="height: 38px; padding: 0px 12px; display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208);"><span style="width: 11px; height: 11px; border-radius: 999px; flex-shrink: 0; background: rgb(232, 133, 59); border: 1px solid rgba(0, 0, 0, 0.12);"></span>Orange</button>
                  <button style="height: 38px; padding: 0px 12px; display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208);"><span style="width: 11px; height: 11px; border-radius: 999px; flex-shrink: 0; background: rgb(226, 75, 74); border: 1px solid rgba(0, 0, 0, 0.12);"></span>Red</button>
                  <button style="height: 38px; padding: 0px 12px; display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208);"><span style="width: 11px; height: 11px; border-radius: 999px; flex-shrink: 0; background: rgb(59, 130, 196); border: 1px solid rgba(0, 0, 0, 0.12);"></span>Blue</button>
              </div>
            </div>

            <div>
              <div style="font-size: 13px; font-weight: 700; color: rgb(26, 26, 26); margin-bottom: 8px;">Preg status</div>
              <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                  <button style="height: 38px; padding: 0px 20px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(14, 38, 70); color: rgb(255, 255, 255); border: 1px solid rgb(14, 38, 70);">Bred</button>
                  <button style="height: 38px; padding: 0px 20px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208);">Open</button>
              </div>
                <div style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgb(222, 227, 236);">
                  <div style="font-size: 12px; font-weight: 600; color: rgb(113, 113, 130); margin-bottom: 8px;">Bred timing <span style="font-weight: 500;">· optional</span></div>
                  <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                      <button style="height: 36px; padding: 0px 13px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208); font-variant-numeric: tabular-nums;">2 mo</button>
                      <button style="height: 36px; padding: 0px 13px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208); font-variant-numeric: tabular-nums;">3 mo</button>
                      <button style="height: 36px; padding: 0px 13px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208); font-variant-numeric: tabular-nums;">4 mo</button>
                      <button style="height: 36px; padding: 0px 13px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(14, 38, 70); color: rgb(255, 255, 255); border: 1px solid rgb(14, 38, 70); font-variant-numeric: tabular-nums;">5 mo</button>
                      <button style="height: 36px; padding: 0px 13px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208); font-variant-numeric: tabular-nums;">6 mo</button>
                      <button style="height: 36px; padding: 0px 13px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208); font-variant-numeric: tabular-nums;">7 mo</button>
                      <button style="height: 36px; padding: 0px 13px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208); font-variant-numeric: tabular-nums;">8 mo</button>
                  </div>
                </div>
            </div>

          </div>
        </div>

        <!-- Quick notes -->
        <div style="background: rgb(255, 255, 255); border: 1px solid rgb(212, 212, 208); border-radius: 12px; overflow: hidden;">
          <div style="background: rgb(238, 241, 246); padding: 7px 12px 8px; border-bottom: 1px solid rgb(222, 227, 236);">
            <div style="font-size: 14px; font-weight: 700; color: rgb(14, 38, 70); letter-spacing: -0.01em;">Quick notes</div>
            <div style="width: 26px; height: 3px; border-radius: 2px; background: rgb(243, 209, 42); margin-top: 4px;"></div>
          </div>
          <div style="padding: 12px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;">
              <button style="height: 38px; padding: 0px 13px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208);">Horns</button>
              <button style="height: 38px; padding: 0px 13px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(14, 38, 70); color: rgb(255, 255, 255); border: 1px solid rgb(14, 38, 70);"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>Lame</button>
              <button style="height: 38px; padding: 0px 13px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208);"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#E24B4A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>Lump jaw</button>
              <button style="height: 38px; padding: 0px 13px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(255, 255, 255); color: rgb(26, 26, 26); border: 1px solid rgb(212, 212, 208);">Thin</button>
              <button style="height: 38px; padding: 0px 13px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; font-family: inherit; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: transform 150ms; background: rgb(14, 38, 70); color: rgb(255, 255, 255); border: 1px solid rgb(14, 38, 70);"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>Wild</button>
            <button aria-label="Add quick note" style="width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; background: rgb(255, 255, 255); border: 1px solid rgb(212, 212, 208); cursor: pointer; padding: 0px; transition: transform 150ms;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#717182" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5v14"></path></svg>
            </button>
          </div>
        </div>

      </div>

      <div style="flex-shrink: 0; padding: 12px 12px 20px; margin-top: auto;">
        <button style="width: 100%; height: 56px; border-radius: 999px; background: rgb(243, 209, 42); color: rgb(14, 38, 70); border: none; font-family: inherit; font-size: 17px; font-weight: 700; letter-spacing: 0.01em; cursor: pointer; transition: background 150ms;">Save &amp; Next</button>
      </div>

    </div>
</div>
</body>
</html>
